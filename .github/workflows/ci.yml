name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: takos-storage-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.BUN_INSTALL_CACHE_DIR }}
          key: ${{ runner.os }}-bun-takos-storage-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-takos-storage-
      - run: bun install --frozen-lockfile
      - run: bun run audit
      - run: bun run fmt:check
      - run: bun run lint
      - run: bun run check
      - run: bun test
      - run: bun run build:worker

  opentofu:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # pinned: v2
        with:
          tofu_version: 1.12.1
          tofu_wrapper: false
      - run: tofu fmt -check -recursive
      - run: tofu init -backend=false -lockfile=readonly
      - run: tofu validate
      - run: tofu test
